<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business OS Myanmar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fb;color:#222}
header{background:#1d4ed8;color:#fff;padding:70px 20px;text-align:center}
header h1{font-size:40px;margin-bottom:15px}
header p{font-size:18px;margin-bottom:25px}
.btn{display:inline-block;padding:14px 26px;background:#fff;color:#1d4ed8;text-decoration:none;border-radius:8px;font-weight:bold}
section{max-width:1200px;margin:auto;padding:60px 20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
.card h3{margin-bottom:10px}
footer{background:#111827;color:#fff;padding:25px;text-align:center}
</style>
</head>

<body>

<header>
<h1>Business OS Myanmar</h1>
<p>Rent your business system within minutes.</p>
<a class="btn" href="/register">Start Free Trial</a>
</header>

<section>
<h2 style="margin-bottom:25px;">Business Types</h2>

<div class="cards">
<div class="card">
<h3>Online Shop</h3>
<p>Inventory + Orders + Customers</p>
</div>

<div class="card">
<h3>Beauty Salon</h3>
<p>Booking + Staff + POS</p>
</div>

<div class="card">
<h3>Mini Mart</h3>
<p>Barcode + POS + Stock</p>
</div>

<div class="card">
<h3>2D Seller</h3>
<p>Commission + Wallet</p>
</div>
</div>
</section>

<footer>
Business OS Myanmar © 2026
</footer>

</body>
</html>
