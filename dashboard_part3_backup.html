<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business OS Dashboard</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Inter',sans-serif;

    background:#080b14;

    color:white;

    min-height:100vh;

}


.app{

    width:100%;

    max-width:480px;

    margin:auto;

    min-height:100vh;

    padding-bottom:90px;

}



/* =====================
   PREMIUM TOP BAR
===================== */


.top-bar{

    height:78px;

    padding:15px 20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:
    linear-gradient(
    135deg,
    rgba(0,229,255,0.12),
    rgba(255,255,255,0.03)
    );

    backdrop-filter:blur(25px);

    border-bottom:
    1px solid rgba(255,255,255,0.12);

}


.brand-area{

    display:flex;

    flex-direction:column;

}


.brand-name{

    font-size:20px;

    font-weight:800;

}


.status{

    font-size:11px;

    color:#00ff99;

}


.status::before{

    content:"";

    display:inline-block;

    width:7px;

    height:7px;

    background:#00ff99;

    border-radius:50%;

    margin-right:5px;

}


.top-actions{

    display:flex;

    align-items:center;

    gap:10px;

}


.notification{

    width:38px;

    height:38px;

    border-radius:14px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:rgba(255,255,255,0.08);

}


.vip{

    font-size:10px;

    padding:5px 8px;

    border-radius:20px;

    background:linear-gradient(135deg,#ffd700,#ff8c00);

    color:#111;

    font-weight:800;

}


.logo{

    font-size:20px;

    font-weight:800;

    letter-spacing:.5px;

}


.logo span{

    color:#00e5ff;

}



.profile-btn{

    width:42px;

    height:42px;

    border-radius:50%;

    background:

    linear-gradient(
    135deg,
    #00e5ff,
    #0066ff
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:700;

}



/* CONTENT AREA */


.content{

    padding:20px;

}





/* =====================
   HERO READY CONTAINER
===================== */


.hero-section{

    margin-top:20px;

    padding:22px;

    border-radius:28px;

    background:

    linear-gradient(
    135deg,
    rgba(0,229,255,0.18),
    rgba(0,102,255,0.18)
    );

    border:

    1px solid rgba(255,255,255,0.12);

    overflow:hidden;

    position:relative;

}


.hero-section::before{

    content:"";

    position:absolute;

    width:160px;

    height:160px;

    right:-50px;

    top:-50px;

    background:

    radial-gradient(
    circle,
    rgba(0,229,255,.5),
    transparent 70%
    );

}


.hero-title{

    font-size:24px;

    font-weight:800;

    position:relative;

}


.hero-subtitle{

    margin-top:8px;

    font-size:13px;

    color:#b8c7d9;

    position:relative;

}



</style>


</head>


<body>


<div class="app">


<!-- PREMIUM TOP BAR START -->


<header class="top-bar">


<div class="brand-area">

<div class="brand-name">

Business<span>OS</span>

</div>

<div class="status">

Online

</div>

</div>


<div class="top-actions">

<div class="vip">

VIP

</div>


<div class="notification">

🔔

</div>


<div class="profile-btn">

R

</div>

</div>


</header>


<!-- PREMIUM TOP BAR END -->


<main class="content">



<!-- HERO BANNER START -->


<section class="hero-section">


<h1 class="hero-title">

Welcome Back 👋

</h1>


<p class="hero-subtitle">

Manage your business smarter with Business OS

</p>


</section>


<!-- HERO BANNER END -->


</main>



</div>


</body>


</html>
