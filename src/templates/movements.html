<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Movements - Business OS ERP</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #090D16; }
        .glass-sidebar { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-navbar { background: rgba(17, 24, 39, 0.5); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .active-menu { background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(29, 78, 216, 0.05) 100%); border-left: 3px solid #3B82F6; color: #FFFFFF; }
    </style>
</head>
<body class="text-gray-100 antialiased min-h-screen flex">

    <!-- LEFT SIDEBAR BACKBONE -->
    <aside class="w-64 glass-sidebar hidden md:flex flex-col fixed inset-y-0 left-0 z-30">
        <div class="px-6 py-5 flex items-center space-x-3 border-b border-gray-800/60">
            <div class="bg-blue-600 p-2 rounded-xl text-white shadow-md"><i class="fa-solid fa-layer-group"></i></div>
            <span class="text-lg font-bold text-white tracking-tight">Business <span class="text-blue-500">OS</span></span>
        </div>
        <div class="px-4 py-3 m-3 rounded-xl bg-gray-900/60 border border-gray-800 text-center">
            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Active Workspace</div>
            <div id="sidebar-tenant-id" class="text-xs text-blue-400 font-medium mt-0.5 truncate">loading...</div>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a href="/dashboard" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-chart-pie mr-3.5 text-base w-5 text-center"></i> Overview Dashboard
            </a>
            <a href="/products/ui" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-box mr-3.5 text-base w-5 text-center"></i> Product Management
            </a>
            <a href="/inventory/ui" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-boxes-stacked mr-3.5 text-base w-5 text-center"></i> Live Inventory
            </a>
            <a href="/movements/ui" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white transition active-menu">
                <i class="fa-solid fa-truck-ramp-box mr-3.5 text-base w-5 text-center"></i> Stock Ledgers
            </a>
        </nav>
    </aside>

    <!-- RIGHT CONTENT INTERFACE -->
    <div class="flex-1 md:pl-64 flex flex-col min-h-screen">
        <header class="sticky top-0 z-20 glass-navbar px-6 py-4 flex justify-between items-center">
            <h1 class="text-lg font-bold text-white tracking-tight">Movement Ledger Node</h1>
            <div class="w-9 h-9 rounded-xl bg-gray-800 border border-gray-700/60 flex items-center justify-center text-purple-400 font-bold"><i class="fa-solid fa-truck-ramp-box"></i></div>
        </header>

        <main class="flex-1 p-6 space-y-6">
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 items-start">
                
                <!-- 1. Stock Entry Form Card -->
                <div class="xl:col-span-1 p-6 rounded-2xl bg-gray-900/40 border border-gray-800/80 shadow-md">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4"><i class="fa-solid fa-file-invoice text-purple-400 mr-1.5"></i> Post Stock Entry</h3>
                    <form id="movement-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Target Product ID</label>
                            <input type="text" id="product_id" required placeholder="Product UUID string" class="w-full px-3 py-2 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white focus:outline-none focus:border-purple-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Quantity (Delta)</label>
                            <input type="number" id="quantity" required placeholder="e.g. 50" class="w-full px-3 py-2 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white focus:outline-none focus:border-purple-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Movement Type</label>
                            <select id="movement_type" required class="w-full px-3 py-2 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white focus:outline-none focus:border-purple-500">
                                <option value="IN" class="bg-gray-900">IN (Stock Procurement / Restock)</option>
                                <option value="OUT" class="bg-gray-900">OUT (Sales / Order Fulfilled)</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-md shadow-purple-600/10">Execute Transaction</button>
                    </form>
                    <div id="form-toast" class="mt-3 p-3 rounded-xl text-xs font-medium text-center hidden border"></div>
                </div>

                <!-- 2. Dynamic ERP Stock Movements Ledger Table List -->
                <div class="xl:col-span-2 p-6 rounded-2xl bg-gray-900/40 border border-gray-800/80 shadow-md">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400"><i class="fa-solid fa-clock-rotate-left text-purple-400 mr-1.5"></i> Audit Trail Ledger Logs</h3>
                        <button id="refresh-btn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl text-xs font-semibold transition flex items-center gap-1.5"><i class="fa-solid fa-rotate text-[10px]"></i> Sync Ledger</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="border-b border-gray-800 text-gray-500 uppercase tracking-wider font-semibold">
                                    <th class="pb-3 font-medium">Product ID Reference</th>
                                    <th class="pb-3 font-medium text-right">Delta Qty</th>
                                    <th class="pb-3 font-medium text-center">Flow Direction</th>
                                </tr>
                            </thead>
                            <tbody id="movements-table-body" class="text-gray-300 divide-y divide-gray-800/50">
                                <!-- Dynamic Rows Injected via JS Execution Engine -->
                                <tr>
                                    <td colspan="3" class="py-8 text-center text-gray-600 font-medium">Initializing live ledger datastream pipeline...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- CORE LEDGER INTERACTION LOGIC ENGINE -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("access_token");
            const tenantId = localStorage.getItem("tenant_id");
            const toast = document.getElementById("form-toast");

            if (!token) { window.location.href = "/auth/login"; return; }
            if (tenantId) { document.getElementById("sidebar-tenant-id").innerText = tenantId; }

            // Fetch list execution routine from secure endpoint context
            async function fetchMovements() {
                const tbody = document.getElementById("movements-table-body");
                try {
                    const response = await fetch("/movements/", {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const movementItems = await response.json();
                    
                    if (!response.ok) throw new Error(movementItems.detail || "Connection failure.");
                    
                    tbody.innerHTML = "";
                    if (movementItems.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-gray-600">Zero inventory movement logs recorded inside this workspace.</td></tr>`;
                        return;
                    }

                    movementItems.forEach(m => {
                        const flowBadge = m.movement_type === "IN" 
                            ? `<span class="px-2 py-0.5 rounded-md bg-emerald-500/10 text-emerald-400 text-[10px] font-semibold border border-emerald-500/10"><i class="fa-solid fa-arrow-down-long mr-1"></i> Stock In</span>`
                            : `<span class="px-2 py-0.5 rounded-md bg-rose-500/10 text-rose-400 text-[10px] font-semibold border border-rose-500/10"><i class="fa-solid fa-arrow-up-long mr-1"></i> Stock Out</span>`;

                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-800/20 transition-colors">
                                <td class="py-3 font-mono text-purple-400 font-medium">${m.product_id}</td>
                                <td class="py-3 text-right font-semibold text-white">${m.quantity} units</td>
                                <td class="py-3 text-center">${flowBadge}</td>
                            </tr>
                        `;
                    });
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="3" class="py-6 text-center text-red-400 font-medium"><i class="fa-solid fa-circle-exclamation mr-1"></i> Ledger pipeline offline: ${err.message}</td></tr>`;
                }
            }

            // Save Entry API POST Transaction Handler
            document.getElementById("movement-form").addEventListener("submit", async (e) => {
                e.preventDefault();
                toast.classList.add("hidden");

                const payload = {
                    product_id: document.getElementById("product_id").value,
                    quantity: parseInt(document.getElementById("quantity").value),
                    movement_type: document.getElementById("movement_type").value
                };

                try {
                    const response = await fetch("/movements/", {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || "Validation or out-of-stock restriction fault.");

                    toast.className = "mt-3 p-3 rounded-xl text-xs font-medium text-center border border-emerald-500/30 text-emerald-400 bg-emerald-500/5 animate-fade";
                    toast.innerText = "✓ Ledger transaction balance updated successfully inside secure DB instance.";
                    toast.classList.remove("hidden");
                    document.getElementById("movement-form").reset();
                    fetchMovements();
                } catch (err) {
                    toast.className = "mt-3 p-3 rounded-xl text-xs font-medium text-center border border-red-500/30 text-red-400 bg-red-500/5 animate-fade";
                    toast.innerText = `✗ Fault Detected: ${err.message}`;
                    toast.classList.remove("hidden");
                }
            });

            document.getElementById("refresh-btn").addEventListener("click", fetchMovements);
            fetchMovements();
        });
    </script>
</body>
</html>
