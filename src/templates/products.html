<!DOCTYPE html>
<html>

<head>

<title>Manage Products</title>

<style>

body{
background:#111827;
color:white;
font-family:Arial;
padding:20px;
}

.box{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:95%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:0;
}

button{
padding:10px;
border:0;
border-radius:8px;
background:#2563eb;
color:white;
margin-top:5px;
}


.product{
background:#374151;
padding:15px;
margin:10px 0;
border-radius:10px;
}


.delete{
background:#dc2626;
}


</style>

</head>


<body>


<h2>📦 Manage Products</h2>


<div class="box">

<h3>Add Product</h3>


<input id="name" placeholder="Product Name">

<input id="sku" placeholder="SKU">

<input id="barcode" placeholder="Barcode">

<input id="stock" placeholder="Stock Qty">

<input id="purchase" placeholder="Purchase Price">

<input id="retail" placeholder="Retail Price">


<button onclick="addProduct()">
➕ Add
</button>


</div>



<div class="box">

<input id="search"
placeholder="🔍 Search Product"
onkeyup="loadProducts()">

</div>



<div id="list"></div>



<script>


const token =
localStorage.getItem("token");



async function loadProducts(){


let res =
await fetch(
"/api/v4/business/products",
{
headers:{
"Authorization":
"Bearer "+token
}
});


let data =
await res.json();


let search =
document.getElementById("search").value
.toLowerCase();



let html="";


data.products
.filter(p=>
p.name.toLowerCase()
.includes(search)
)
.forEach(p=>{


html += `

<div class="product">


<h3>
📦 ${p.name}
</h3>


SKU:
${p.sku}
<br>


Stock:
${p.stock_qty}

<br>


Buy:
${p.purchase_price}

<br>


Sell:
${p.retail_price}



<br><br>


<button class="delete"
onclick="deleteProduct('${p.id}')">

🗑 Delete

</button>


</div>


`;


});


document.getElementById("list")
.innerHTML=html;


}




async function addProduct(){


let body={


name:
name.value,


sku:
sku.value,


barcode:
barcode.value,


stock_qty:
Number(stock.value),


purchase_price:
Number(purchase.value),


retail_price:
Number(retail.value)


};



await fetch(
"/api/v4/business/products",
{

method:"POST",

headers:{

"Authorization":
"Bearer "+token,

"Content-Type":
"application/json"

},

body:
JSON.stringify(body)

});


alert("Product Added");


loadProducts();


}





async function deleteProduct(id){


if(!confirm("Delete Product?"))
return;


await fetch(
"/api/v4/business/products/"+id,
{

method:"DELETE",

headers:{

"Authorization":
"Bearer "+token

}

});


loadProducts();


}



loadProducts();


</script>


</body>

</html>
