<!DOCTYPE html>
<html>
<head>
<title>Business OS Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

.header{
padding:20px;
background:#1f2937;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#374151;
padding:18px;
border-radius:15px;
}

.title{
font-size:15px;
opacity:.8;
}

.number{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.sales{
background:#065f46;
}

.alert{
background:#7f1d1d;
}

.menu{
margin-top:30px;
}

button{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
}

a{
text-decoration:none;
}

</style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script>

async function loadRevenueExpense(){

try{

const res = await fetch(
"/dashboard/revenue-expense",
{
headers:{
"Authorization":"Bearer "+localStorage.getItem("access_token")
}
}
);

const data = await res.json();

console.log("Profit API:", data);

if(!data.summary){
alert(JSON.stringify(data));
return;
}


new Chart(
document.getElementById("revenueExpenseChart"),
{
type:"bar",
data:{
labels:["Revenue","Expense","Profit"],
datasets:[
{
label:"Amount",
data:[
data.summary.revenue,
data.summary.expense,
data.summary.profit
]
}
]
},
options:{
responsive:true
}
}
);

}
catch(e){

console.log("Revenue Expense Error",e);
alert("Revenue Chart Error: "+e);

}

}


window.addEventListener(
"load",
function(){
loadRevenueExpense();
}
);





async function loadProfitChart(){

try{

const res = await fetch(
"/dashboard/revenue-expense",
{
headers:{
"Authorization":"Bearer "+localStorage.getItem("access_token")
}
}
);

const data = await res.json();

new Chart(
document.getElementById("profitChart"),
{
type:"line",
data:{
labels:["Revenue","Expense","Profit"],
datasets:[
{
label:"Business Performance",
data:[
data.summary.revenue,
data.summary.expense,
data.summary.profit
],
fill:false,
tension:0.35
}
]
},
options:{
responsive:true
}
}
);

}
catch(e){
console.log("Profit Chart Error",e);
}

}

loadProfitChart();


</script>

<script>

async function loadSalesTrend(){

try{

const res = await fetch(
"/dashboard/sales-trend",
{
headers:{
"Authorization":"Bearer "+localStorage.getItem("access_token")
}
}
);

const data = await res.json();

const labels = data.trend.map(x=>x.date);
const sales = data.trend.map(x=>x.sales);

new Chart(
document.getElementById("salesChart"),
{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Sales",
data:sales,
fill:false,
tension:0.35
}
]
},
options:{
responsive:true,
plugins:{
legend:{
display:true
}
}
}
}
);

}
catch(e){
console.log("Sales Trend Error",e);
}

}

loadSalesTrend();


</script>
</head>

<body>

<div class="header">
🚀 Business OS Owner Dashboard
</div>

<div class="container">

<div class="cards">

<div class="card">
<div class="title">📦 Products</div>
<div class="number" id="products">0</div>
</div>

<div class="card">
<div class="title">🛒 Orders</div>
<div class="number" id="orders">0</div>
</div>

<div class="card">
<div class="title">👥 Customers</div>
<div class="number" id="customers">0</div>
</div>

<div class="card">
<div class="title">🚚 Suppliers</div>
<div class="number" id="suppliers">0</div>
</div>

<div class="card sales">
<div class="title">💰 Sales</div>
<div class="number" id="sales">0</div>
</div>

<div class="card alert">
<div class="title">⚠️ Credit Alerts</div>
<div class="number" id="alerts">0</div>
</div>

</div>

<div class="ai-panel">

<div class="ai-title">
🤖 AI Business Advisor
</div>

<div id="aiRecommendations">
Loading AI recommendations...
</div>

</div>


<div class="menu">

<a href="/products/ui">
<button>📦 Manage Products</button>
</a>

<a href="/orders/ui">
<button>🛒 Orders</button>
</a>

<a href="/customers/ui">
<button>👥 Customers</button>
</a>

<a href="/suppliers/ui">
<button>🚚 Suppliers</button>
</a>

</div>

</div>



<div class="card" style="margin-top:20px;padding:20px;">
<h3>📈 Last 7 Days Sales Trend</h3>
<canvas id="salesChart" height="120"></canvas>

<div class="card" style="margin-top:20px;padding:20px;">
<h3>💹 Revenue vs Expense</h3>
<canvas id="revenueExpenseChart" height="120"></canvas>
</div>

<div class="card" style="margin-top:20px;padding:20px;">
<h3>📈 Profit Analysis</h3>
<canvas id="profitChart" height="120"></canvas>
</div>



<script>

async function loadDashboard(){

try{

const res = await fetch(
"/dashboard/ceo-summary",
{
headers:{
"Authorization":
"Bearer " + localStorage.getItem("access_token")
}
}
);

const data = await res.json();


document.getElementById("products").innerText =
data.dashboard?.total_products ?? 0;


document.getElementById("orders").innerText =
data.dashboard?.total_orders ?? 0;


document.getElementById("customers").innerText =
data.dashboard?.total_customers ?? 0;


document.getElementById("suppliers").innerText =
data.dashboard?.total_suppliers ?? 0;


document.getElementById("sales").innerText =
"$ " + (data.dashboard?.total_sales ?? 0);


document.getElementById("alerts").innerText =
data.dashboard?.low_stock ?? 0;


}
catch(error){

console.log(
"Dashboard Error:",
error
);

}

}


loadDashboard();
loadAIRecommendations();




async function loadAIRecommendations(){

try{

const res = await fetch(
"/ai/recommendations",
{
headers:{
"Authorization":
"Bearer " + localStorage.getItem("access_token")
}
}
);


const data = await res.json();


const box =
document.getElementById(
"aiRecommendations"
);


box.innerHTML = "";


data.forEach(item=>{


let cls =
item.priority.toLowerCase();


box.innerHTML += `

<div class="ai-item ai-${cls}">

<b>${item.title}</b>

<br>

${item.action}

</div>

`;

});


}
catch(error){

console.log(
"AI Error:",
error
);

}

}


</script>



<div id="aiInsightCard" class="card" style="margin-top:20px;padding:20px;">
<h3>🤖 AI Business Insight</h3>
<div id="aiInsightList">
Loading AI Insights...
</div>
</div>



<script>

async function loadAIInsights(){

try{

const res = await fetch(
"/ai/insights",
{
headers:{
"Authorization":
"Bearer "+localStorage.getItem("access_token")
}
}
);

const data = await res.json();

const box = document.getElementById(
"aiInsightList"
);

if(!box) return;


box.innerHTML = "";


data.forEach(item=>{

let icon="ℹ️";

if(item.level==="WARNING"){
icon="⚠️";
}

box.innerHTML += `
<div style="margin:12px 0;padding:10px;border-radius:8px;background:#111827;color:white;">
<b>${icon} ${item.title}</b>
<br>
${item.message}
</div>
`;

});


}
catch(e){

console.log(
"AI Insight Error",
e
);

}

}


loadAIInsights();

</script>


</body>
</html>
