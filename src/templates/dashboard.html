<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business OS Dashboard</title>

<link rel="stylesheet" href="/static/app.css">
<script defer src="/static/app.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.container{
max-width:480px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
font-weight:bold;
}

.header p{
margin-top:8px;
color:#94a3b8;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
margin-bottom:25px;
}
.card{
background:#1e293b;
border-radius:18px;
padding:18px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.25);
}

.card h2{
font-size:30px;
margin-bottom:8px;
color:#38bdf8;
}

.card p{
font-size:14px;
color:#cbd5e1;
}

.menu{
display:grid;
gap:15px;
}

.btn{
display:block;
text-decoration:none;
text-align:center;
padding:16px;
border-radius:16px;
font-size:16px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.btn:active{
transform:scale(.98);
}

.logout{
background:linear-gradient(135deg,#dc2626,#ef4444);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🚀 Business OS</h1>
<p>Enterprise Dashboard</p>
</div>

<div class="stats">

<div class="card">
<h2 id="products">0</h2>
<p>Products</p>
</div>

<div class="card">
<h2 id="orders">0</h2>
<p>Orders</p>
</div>

<div class="card">
<h2 id="customers">0</h2>
<p>Customers</p>
</div>

<div class="card">
<h2 id="suppliers">0</h2>
<p>Suppliers</p>
</div>

</div>

<div class="menu">
<a href="/products/ui" class="btn">
📦 Product Management
</a>

<a href="/inventory/ui" class="btn">
📥 Inventory
</a>

<a href="/orders/ui" class="btn">
🛒 Orders
</a>

<a href="/customers/ui" class="btn">
👥 Customers
</a>

<a href="/suppliers/ui" class="btn">
🚚 Suppliers
</a>

<a href="#" onclick="logout()" class="btn logout">
🚪 Logout
</a>

</div>

</div>
<script>

async function loadDashboard(){

    const token = localStorage.getItem("access_token");

    if(!token){
        location="/login";
        return;
    }

    const r = await fetch("/api/v4/dashboard/summary",{
        headers:{
            "Authorization":"Bearer "+token
        }
    });

    if(!r.ok){
        alert(await r.text());
        return;
    }

    const d = await r.json();

    document.getElementById("products").innerText=d.products??0;
    document.getElementById("orders").innerText=d.orders??0;
    document.getElementById("customers").innerText=d.customers??0;
    document.getElementById("suppliers").innerText=d.suppliers??0;

}

loadDashboard();

</script>

<script>
function logout(){
    localStorage.removeItem("access_token");
    localStorage.removeItem("tenant_id");
    localStorage.removeItem("role_profile");
    location="/login";
}
</script>

</body>
</html>
