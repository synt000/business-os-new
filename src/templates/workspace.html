<!DOCTYPE html>
<html>
<head>
<title>Business OS</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Business OS Enterprise</h1>

<div class="grid">

<div class="card">
<h2 id="products">0</h2>
<p>Products</p>
</div>

<div class="card">
<h2 id="orders">0</h2>
<p>Orders</p>
</div>

<div class="card">
<h2 id="customers">0</h2>
<p>Customers</p>
</div>

<div class="card">
<h2 id="suppliers">0</h2>
<p>Suppliers</p>
</div>

</div>


<div class="card">

<h2>Control Center</h2>

<p>
Auth:
<span id="authStatus">
Loading...
</span>
</p>

<p>
Tenant:
<span id="tenantId">-</span>
</p>

</div>


<div class="menu">

<button onclick="location.href='/products'">
Products
</button>

<button onclick="location.href='/inventory'">
Inventory
</button>

<button onclick="location.href='/orders'">
Orders
</button>

<button onclick="logout()">
Logout
</button>

</div>


<script src="/static/app.js?v=8"></script>


<script>

document.getElementById("authStatus").innerText =
localStorage.getItem("access_token")
?"JWT Authenticated"
:"Not Logged";

document.getElementById("tenantId").innerText =
localStorage.getItem("tenant_id") || "-";

</script>


</body>
</html>
