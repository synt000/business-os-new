<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Business OS ERP</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0B0F19; }
        .glass-panel { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="text-gray-100 antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Ambient background glow spots -->
    <div class="absolute top-1/4 left-1/3 w-80 h-80 bg-blue-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-3 group">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/20 group-hover:scale-105 transition">
                    <i class="fa-solid fa-layer-group text-lg"></i>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">Business <span class="text-blue-500">OS</span></span>
            </a>
            <h2 class="text-2xl font-bold text-white mt-6 tracking-tight">Welcome back</h2>
            <p class="text-sm text-gray-400 mt-1">Enter your corporate credentials to sign in</p>
        </div>

        <!-- Main Login Card -->
        <div class="glass-panel p-8 rounded-2xl shadow-2xl">
            <form id="login-form" class="space-y-5">
                <!-- Tenant ID Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Workspace Tenant ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-building"></i></span>
                        <input type="text" id="tenant_id" required placeholder="e.g. company_primary" class="w-full pl-10 pr-4 py-3 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>
                <!-- Email Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Corporate Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required placeholder="name@company.com" class="w-full pl-10 pr-4 py-3 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>
                <!-- Password Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Secure Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-3 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>

                <!-- Submit Button Hook -->
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-3.5 rounded-xl transition shadow-lg shadow-blue-600/20 active:scale-[0.99] flex items-center justify-center gap-2">
                    Sign In to Dashboard <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </form>

            <!-- Extra Router Links Area -->
            <div class="mt-6 pt-6 border-t border-gray-800/60 text-center text-xs text-gray-500">
                Don't have a workspace instance? 
                <a href="/auth/register" class="text-blue-400 hover:text-blue-300 font-medium transition ml-1">Create Tenant</a>
            </div>
        </div>
        
        <!-- Quick Feedback Status Notification Toast -->
        <div id="toast" class="mt-4 p-4 rounded-xl text-xs font-medium text-center hidden glass-panel border animate-fade"></div>
    </div>

    <!-- Frontend Interactive Script Processing Engine -->
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const tenant_id = document.getElementById("tenant_id").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const toast = document.getElementById("toast");

            // Reset UI Notification State
            toast.classList.add("hidden");

            try {
                // Call corporate authentication endpoint securely
                const response = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tenant_id, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    toast.className = "mt-4 p-4 rounded-xl text-xs font-medium text-center glass-panel border border-emerald-500/30 text-emerald-400 bg-emerald-500/5 animate-fade";
                    toast.innerText = "✓ Auth Token Verified. Redirecting to core node...";
                    toast.classList.remove("hidden");
                    
                    // Securely inject JWT access token into localStorage context
                    localStorage.setItem("access_token", data.access_token);
                    localStorage.setItem("tenant_id", tenant_id);
                    
                    // Route directly to Admin Shell Workspace
                    setTimeout(() => { window.location.href = "/dashboard"; }, 1000);
                } else {
                    throw new Error(data.detail || "Invalid enterprise credentials provided.");
                }
            } catch (err) {
                toast.className = "mt-4 p-4 rounded-xl text-xs font-medium text-center glass-panel border border-red-500/30 text-red-400 bg-red-500/5 animate-fade";
                toast.innerText = `✗ Security Alert: ${err.message}`;
                toast.classList.remove("hidden");
            }
        });
    </script>
</body>
</html>
