<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Business OS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;padding:24px;">
    <div class="ambient-bg" style="top:20%;left:20%;"></div>
    
    <div class="luxury-glass" style="max-width:420px;width:100%;padding:40px 32px;text-align:center;">
        <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">Welcome Back</h1>
        <p style="font-size:13px;color:#94A3B8;margin-bottom:24px;">Access your active multi-tenant dynamic stack.</p>
        
        <form id="loginForm" style="display:flex;flex-direction:column;gap:16px;text-align:left;">
            <input type="email" id="loginEmail" placeholder="Work Email" required style="width:100%;height:46px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0 16px;color:#FFF;font-size:13px;">
            <input type="password" id="loginPassword" placeholder="Password" required style="width:100%;height:46px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0 16px;color:#FFF;font-size:13px;">
            
            <button type="submit" class="btn-primary btn-p-hover" style="width:100%;height:46px;border-radius:10px;margin-top:8px;border:none;color:white;font-weight:700;cursor:pointer;">Authenticate Stack</button>
        </form>
        
        <p style="font-size:12px;color:#94A3B8;margin-top:20px;">Don&apos;t have an account? <a href="/auth/register" style="color:#3B82F6;text-decoration:none;">Create One</a></p>
    </div>

    <!-- HIGH-PERFORMANCE MODERN LOGIN & JWT STORAGE HANDLER -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const requestPayload = {
                email: email,
                password: password
            };

            try {
                // 4. FRONTEND INTEGRATION: POST TARGETED CREDENTIALS TO LOGIN API ENDPOINT
                const response = await fetch('/api/v4/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestPayload)
                });

                const data = await response.json();

                if (response.ok) {
                    // SECURE STORAGE LAYER: COMMIT AUTH CONTRACTS TO LOCALSTORAGE
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('tenant_id', data.tenant_id);
                    localStorage.setItem('user_role', data.role);

                    alert("Authentication Granted! Initializing Workspace Core. 🔐");
                    window.location.href = '/dashboard'; // Dynamic redirect straight to guarded dashboard panel
                } else {
                    alert("Authentication Refused: " + (data.detail || "Invalid Email or Password Credentials"));
                }
            } catch (err) {
                alert("Network Core Delivery Interrupted: " + err.message);
            }
        });
    </script>
</body>
</html>
