<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Business OS Login</title>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="login-card">

<h1>Business OS</h1>

<p>Enterprise Workspace Login</p>

<form id="loginForm">

<input
id="email"
type="email"
placeholder="Email"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<button type="submit">

Sign In

</button>

</form>

</div>

<script src="/static/app.js"></script>

<script>

document
.getElementById("loginForm")
.addEventListener("submit",async function(e){

e.preventDefault();

await login(

document.getElementById("email").value,

document.getElementById("password").value

);

});

</script>

</body>

</html>
