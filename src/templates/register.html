<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tenant Workspace - Business OS ERP</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0B0F19; }
        .glass-panel { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="text-gray-100 antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Ambient background glow spots -->
    <div class="absolute top-1/4 left-1/3 w-80 h-80 bg-blue-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10">
        <!-- Logo Header -->
        <div class="text-center mb-6">
            <a href="/" class="inline-flex items-center space-x-3 group">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/20 group-hover:scale-105 transition">
                    <i class="fa-solid fa-layer-group text-lg"></i>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">Business <span class="text-blue-500">OS</span></span>
            </a>
            <h2 class="text-2xl font-bold text-white mt-4 tracking-tight">Deploy your ecosystem</h2>
            <p class="text-sm text-gray-400 mt-1">Setup a secure multi-tenant cloud environment</p>
        </div>

        <!-- Main Register Card -->
        <div class="glass-panel p-6 rounded-2xl shadow-2xl">
            <form id="register-form" class="space-y-4">
                <!-- Desired Tenant ID Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">New Workspace ID (Tenant)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-globe"></i></span>
                        <input type="text" id="tenant_id" required placeholder="e.g. mybrand_erp" class="w-full pl-10 pr-4 py-2.5 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>
                <!-- Admin Username Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Administrator Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="username" required placeholder="e.g. Daw Aye Aye" class="w-full pl-10 pr-4 py-2.5 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>
                <!-- Admin Email Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Corporate Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required placeholder="admin@mybrand.com" class="w-full pl-10 pr-4 py-2.5 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>
                <!-- Secure Password Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Create Secure Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-500 text-sm"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" required placeholder="Minimum 8 characters" class="w-full pl-10 pr-4 py-2.5 bg-gray-900/60 border border-gray-800 rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/60 focus:bg-gray-900 transition">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-sm font-semibold py-3 rounded-xl transition shadow-lg shadow-blue-600/10 active:scale-[0.99] flex items-center justify-center gap-2 mt-2">
                    Initialize Workspace <i class="fa-solid fa-rocket text-xs"></i>
                </button>
            </form>

            <!-- Extra Navigation Paths -->
            <div class="mt-6 pt-6 border-t border-gray-800/60 text-center text-xs text-gray-500">
                Already registered your brand? 
                <a href="/auth/login" class="text-blue-400 hover:text-blue-300 font-medium transition ml-1">Sign In</a>
            </div>
        </div>
        
        <!-- Feedback Notification System Toast -->
        <div id="toast" class="mt-4 p-4 rounded-xl text-xs font-medium text-center hidden glass-panel border animate-fade"></div>
    </div>

    <!-- Frontend Interactive Register Processing Engine -->
    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const tenant_id = document.getElementById("tenant_id").value;
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const toast = document.getElementById("toast");

            // Reset UI Notification State
            toast.classList.add("hidden");

            try {
                // Call multi-tenant onboarding endpoint securely
                const response = await fetch("/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tenant_id, username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    toast.className = "mt-4 p-4 rounded-xl text-xs font-medium text-center glass-panel border border-emerald-500/30 text-emerald-400 bg-emerald-500/5 animate-fade";
                    toast.innerText = "✓ Tenant Instance Built Successfully! Redirecting to login...";
                    toast.classList.remove("hidden");
                    
                    // Route directly to Login Page after brief pause
                    setTimeout(() => { window.location.href = "/auth/login"; }, 1500);
                } else {
                    throw new Error(data.detail || "Failed to initialize workspace template.");
                }
            } catch (err) {
                toast.className = "mt-4 p-4 rounded-xl text-xs font-medium text-center glass-panel border border-red-500/30 text-red-400 bg-red-500/5 animate-fade";
                toast.innerText = `✗ Workspace Error: ${err.message}`;
                toast.classList.remove("hidden");
            }
        });
    </script>
</body>
</html>
