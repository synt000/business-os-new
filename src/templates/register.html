<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Business OS</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #f3f4f6; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Dashboard Premium Button Style */
        .dashboard-btn {
            background: gradient-to-r from-blue-600 to-indigo-600;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dashboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .dashboard-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .dashboard-btn:hover::after {
            left: 120%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-b from-[#0b0f19] to-[#060810]">

    <div class="glass-card w-full max-w-md rounded-2xl p-8 shadow-2xl relative border border-gray-800">
        <!-- Top Tech Line Accent -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-[2px] bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>

        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Start Your Trial</h2>
            <p class="text-sm text-gray-400 mt-2">လုပ်ငန်းသုံး အကောင့်ကို အခမဲ့ စတင်ဖန်တီးပါ။</p>
            <div id="bizBadge" class="inline-block mt-3 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-400 text-xs font-semibold tracking-wider uppercase">
                Selected Flow: Loading...
            </div>
        </div>

        <!-- Registration Form -->
        <form id="registerForm" class="space-y-4" onsubmit="handleRegister(event)">
            <!-- Hidden Input to catch business type from URL -->
            <input type="hidden" id="business_type" name="business_type">

            <!-- အမည် -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">အမည်</label>
                <input type="text" id="full_name" required class="w-full px-4 py-3 rounded-xl bg-gray-950/40 border border-gray-800 text-white focus:outline-none focus:border-blue-500 text-sm transition-all focus:ring-2 focus:ring-blue-500/20" placeholder="သင့်အမည်ကို ရိုက်ထည့်ပါ">
            </div>

            <!-- Business Name -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Business Name</label>
                <input type="text" id="business_name" required class="w-full px-4 py-3 rounded-xl bg-gray-950/40 border border-gray-800 text-white focus:outline-none focus:border-blue-500 text-sm transition-all focus:ring-2 focus:ring-blue-500/20" placeholder="ဥပမာ - မောင်မောင် အရောင်းဆိုင် / ဆိုင်အမည်">
            </div>

            <!-- Email or Phone -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email or Phone</label>
                <input type="text" id="username_or_email" required class="w-full px-4 py-3 rounded-xl bg-gray-950/40 border border-gray-800 text-white focus:outline-none focus:border-blue-500 text-sm transition-all focus:ring-2 focus:ring-blue-500/20" placeholder="အီးမေးလ် သို့မဟုတ် ဖုန်းနံပါတ်">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl bg-gray-950/40 border border-gray-800 text-white focus:outline-none focus:border-blue-500 text-sm transition-all focus:ring-2 focus:ring-blue-500/20" placeholder="••••••••">
            </div>

            <!-- Set Password -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Set Password</label>
                <input type="password" id="confirm_password" required class="w-full px-4 py-3 rounded-xl bg-gray-950/40 border border-gray-800 text-white focus:outline-none focus:border-blue-500 text-sm transition-all focus:ring-2 focus:ring-blue-500/20" placeholder="စကားဝှက်ကို ထပ်မံရိုက်ထည့်ပါ">
            </div>

            <!-- Dashboard Style Glow Button -->
            <button type="submit" class="dashboard-btn w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl tracking-wide text-sm mt-4 block text-center uppercase">
                🚀 Create Enterprise Account
            </button>
        </form>

        <div class="text-center mt-6 text-xs text-gray-500">
            By signing up, you agree to our Terms of Service.
        </div>
    </div>

    <script>
        // Catch Business Type from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const bizType = urlParams.get('type') || 'General Business';
        document.getElementById('business_type').value = bizType;
        document.getElementById('bizBadge').innerText = "Selected Flow: " + bizType;

        async function handleRegister(e) {
            e.preventDefault();
            
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;

            if (pass !== confirmPass) {
                alert("Password နှင့် Set Password မကိုက်ညီပါ။ ပြန်လည်စစ်ဆေးပါ။");
                return;
            }

            // Backend Schema (RegisterInboundPayload) ကိုက်ညီမည့် ကွက်လပ်များ ပြင်ဆင်ခြင်း
            const payload = {
                email: document.getElementById('username_or_email').value,
                password: pass,
                business_name: document.getElementById('business_name').value,
                owner_name: document.getElementById('full_name').value,
                business_type: document.getElementById('business_type').value
            };

            try {
                // Backend API သို့ ဒေတာ အစစ်အမှန် လှမ်းပို့ခြင်း
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    alert('🎉 Account Created Successfully! Going to your Dashboard...');
                    window.location.href = '/dashboard'; 
                } else {
                    alert('❌ Error: ' + (data.detail || 'Registration failed. Please check your data.'));
                }
            } catch (err) {
                alert('⚠️ Server Connection Error. Please ensure server is running.');
            }
        }
    </script>
</body>
</html>
