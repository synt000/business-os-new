version: '3.8'

services:
  # ==========================================================================
  # THE CORE BUSINESS OS CORE SAAS APPLICATION ENGINE
  # ==========================================================================
  web_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: business_os_core_gateway
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=prod-business-os-enterprise-9.9-jwt-key-2026
    volumes:
      - .:/app
    networks:
      - saas_enterprise_network

networks:
  saas_enterprise_network:
    driver: bridge
