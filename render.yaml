services:
  - type: web
    name: business-os
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn apps.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./business_os.db
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: SECRET_KEY
        value: change_this_to_a_long_random_secret_key
      - key: ALGORITHM
        value: HS256
