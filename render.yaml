services:
  - type: web
    name: business-os-erp
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: ENVIRONMENT
        value: production

      - key: SECRET_KEY
        sync: false

      - key: ALGORITHM
        value: HS256

      - key: DATABASE_URL
        fromDatabase:
          name: business-os-db
          property: connectionString

databases:
  - name: business-os-db
    plan: free
    region: singapore
