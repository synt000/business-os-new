# ==========================================================================
# BUSINESS OS - RENDER CLOUD BLUEPRINT SPECIFICATION (INFRASTRUCTURE AS CODE)
# ==========================================================================
services:
  - type: web
    name: business-os-erp
    env: docker
    repo: https://github.com # Auto-linked via GitHub Git push
    plan: free
    region: singapore # Optimized latency for SE Asia region
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        value: generate_a_secure_random_string_here_for_production
      - key: ALGORITHM
        value: HS256
    disk:
      name: erp-sqlite-data
      mountPath: /app/data
      sizeGB: 1
