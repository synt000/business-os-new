<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business OS Dashboard</title>


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Inter',sans-serif;

    background:#080b14;

    color:white;

    min-height:100vh;

}


.app{

    width:100%;

    max-width:480px;

    margin:auto;

    min-height:100vh;

    padding-bottom:90px;

}



/* =====================
   PREMIUM TOP BAR
===================== */


.top-bar{

    height:70px;

    padding:15px 20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:

    linear-gradient(
    135deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.02)
    );


    backdrop-filter:blur(20px);

    border-bottom:

    1px solid rgba(255,255,255,0.08);

}


.logo{

    font-size:20px;

    font-weight:800;

    letter-spacing:.5px;

}


.logo span{

    color:#00e5ff;

}



.profile-btn{

    width:42px;

    height:42px;

    border-radius:50%;

    background:

    linear-gradient(
    135deg,
    #00e5ff,
    #0066ff
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-weight:700;

}



/* CONTENT AREA */


.content{

    padding:20px;

}



</style>


</head>


<body>


<div class="app">


<!-- PREMIUM TOP BAR START -->


<header class="top-bar">


<div class="logo">

Business<span>OS</span>

</div>


<div class="profile-btn">

R

</div>


</header>


<!-- PREMIUM TOP BAR END -->


<main class="content">



<!-- NEXT PARTS WILL COME HERE -->


</main>



</div>


</body>


</html>
